<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="X-Frame-Options" content="ALLOWALL">
<title>TrueMate — Propuesta IUL</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#193251;--navy2:#0d1f33;--red:#FF5050;--gold:#c9a84c;--green:#27ae71;--cream:#f0ead8}
body{font-family:'DM Sans',sans-serif;background:var(--navy2);color:var(--cream);min-height:100vh;padding:20px}
.wrap{max-width:580px;margin:0 auto}

/* HEADER */
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.1)}
.hdr-logo{width:40px;height:40px;background:var(--red);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:18px;color:#fff}
.hdr-t{font-family:'DM Serif Display',serif;font-size:18px;color:var(--cream)}
.hdr-s{font-size:9px;color:#7a8a9a;letter-spacing:2px;text-transform:uppercase;display:block}

/* SECTIONS */
.sec{margin-bottom:22px}
.sec-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid rgba(255,80,80,.2)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.row.full{grid-template-columns:1fr}
.row.tri{grid-template-columns:1fr 1fr 1fr}
.field label{font-size:11px;font-weight:600;color:#8899aa;display:block;margin-bottom:5px}
.field input,.field select{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:10px 13px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--red)}
.field select option{background:#193251}
.field input::placeholder{color:#4a5a6a}
.field .hint{font-size:10px;color:#5a6a7a;margin-top:4px}

/* INDEX BADGES */
.idx-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.idx-b{padding:7px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.15);font-size:12px;color:#8899aa;cursor:pointer;background:transparent;transition:all .2s}
.idx-b.on{background:var(--red);border-color:var(--red);color:#fff;font-weight:700}

/* GENERATE BUTTON */
.gen-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:11px;padding:15px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;margin-top:6px}
.gen-btn:hover{opacity:.9}

/* RESULT */
#result-box{display:none;margin-top:18px;background:rgba(39,174,113,.08);border:1px solid rgba(39,174,113,.3);border-radius:12px;padding:16px}
.rb-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--green);margin-bottom:10px}
#result-url{font-size:12px;color:#8899aa;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:9px 12px;word-break:break-all;margin-bottom:10px;line-height:1.6;min-height:36px}
.rb-btns{display:flex;gap:8px}
.wa-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:#25D366;color:#fff;border:none;border-radius:9px;padding:11px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none}
.copy-btn{background:transparent;color:#8899aa;border:1px solid rgba(255,255,255,.15);border-radius:9px;padding:11px 16px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
#copy-ok{display:none;text-align:center;font-size:12px;color:var(--green);margin-top:7px}
</style>
</head>
<body>
<div class="wrap">

<div class="hdr">
  <div class="hdr-logo">T</div>
  <div>
    <div class="hdr-t">TrueMate <span style="color:var(--red)">·</span> Propuesta IUL</div>
    <span class="hdr-s">Generador de link para cliente</span>
  </div>
</div>

<!-- CLIENTE -->
<div class="sec">
  <div class="sec-title">Cliente</div>
  <div class="row">
    <div class="field"><label>Nombre completo</label><input id="f-nombre" type="text" placeholder="Ej: Fabiola Bermudez"></div>
    <div class="field"><label>Edad</label><input id="f-edad" type="number" placeholder="Ej: 40"></div>
  </div>
  <div class="row">
    <div class="field"><label>Fecha de reunión (opcional)</label><input id="f-fecha" type="text" placeholder="Ej: jueves 28 de abril 3pm"></div>
    <div class="field">
      <label>Agente</label>
      <select id="f-perfil">
        <option value="gregorio">Gregorio Navarro</option>
        <option value="agente">Agente TrueMate</option>
      </select>
    </div>
  </div>
</div>

<!-- PÓLIZA -->
<div class="sec">
  <div class="sec-title">Datos de la póliza</div>
  <div class="row">
    <div class="field"><label>Prima mensual ($)</label><input id="f-pm" type="text" placeholder="Ej: 2000"></div>
    <div class="field"><label>Años de pago</label><input id="f-an" type="text" placeholder="Ej: 20" oninput="updateLabels()"></div>
  </div>
  <div class="row">
    <div class="field"><label>Prima mínima MMP (anual $)</label><input id="f-mmp" type="text" placeholder="Ej: 11344"></div>
    <div class="field"><label>Prima máxima Non-MEC (anual $)</label><input id="f-nm" type="text" placeholder="Ej: 173899"></div>
  </div>
  <div class="row">
    <div class="field"><label>Beneficio por muerte hoy ($)</label><input id="f-bm" type="text" placeholder="Ej: 3120022"></div>
    <div class="field"><label>Beneficio muerte a los <span id="lbl-an1">__ años</span> ($)</label><input id="f-bman" type="text" placeholder="Ej: 3250000"></div>
  </div>
  <div class="sec-title" style="margin-top:14px">Índice</div>
  <div class="idx-badges">
    <button class="idx-b on" onclick="setIdx(this,'S&P 500 Cap 11%')">S&P 500 · Cap 11%</button>
    <button class="idx-b" onclick="setIdx(this,'S&P 500 Cap 10%')">S&P 500 · Cap 10%</button>
    <button class="idx-b" onclick="setIdx(this,'S&P 500 Cap 9%')">S&P 500 · Cap 9%</button>
    <button class="idx-b" onclick="setIdx(this,'S&P 500 point-to-point Cap 11%')">Point-to-Point · 11%</button>
  </div>
  <input id="f-ix" type="hidden" value="S&P 500 Cap 11%">
</div>

<!-- CASH VALUE -->
<div class="sec">
  <div class="sec-title">Cash Value acumulado</div>
  <div class="row tri">
    <div class="field"><label>A los 10 años ($)</label><input id="f-cv10" type="text" placeholder="Ej: 222708"></div>
    <div class="field"><label>A los 20 años ($)</label><input id="f-cv20" type="text" placeholder="Ej: 675693"></div>
    <div class="field"><label>Cash value a los 60 años ($)</label><input id="f-cv" type="text" placeholder="Ej: 861554"></div>
  </div>
</div>

<button class="gen-btn" onclick="genLink()">
  🔗 Generar link del cliente
</button>

<div id="result-box">
  <div class="rb-title">✅ Link listo</div>
  <div id="result-url">Generando...</div>
  <div class="rb-btns">
    <a class="wa-btn" id="wa-btn" href="#" target="_blank">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Enviar por WhatsApp
    </a>
    <button class="copy-btn" onclick="copyLink()">📋 Copiar</button>
  </div>
  <div id="copy-ok">✅ Copiado</div>
</div>

</div>
<script>
var selectedIdx = 'S&P 500 Cap 11%';

function setIdx(btn, val){
  document.querySelectorAll('.idx-b').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  selectedIdx = val;
  document.getElementById('f-ix').value = val;
}

function updateLabels(){
  var an = document.getElementById('f-an').value || '__';
  document.getElementById('lbl-an1').textContent = an + ' años';
  document.getElementById('lbl-an2').textContent = an + ' años';
}

function g(id){ return (document.getElementById(id)||{}).value || ''; }

function genLink(){
  var nombre = g('f-nombre').trim();
  if(!nombre){ alert('Ingresa el nombre del cliente'); return; }

  var data = {
    n:   nombre,
    ed:  g('f-edad'),
    pm:  g('f-pm'),
    an:  g('f-an'),
    mmp: g('f-mmp'),
    nm:  g('f-nm'),
    bm:  g('f-bm'),
    bman:g('f-bman'),
    ix:  selectedIdx,
    cv10:g('f-cv10'),
    cv20:g('f-cv20'),
    cv:  g('f-cv'),
    p:   g('f-perfil'),
    f:   g('f-fecha')
  };

  // Remove empty keys
  Object.keys(data).forEach(function(k){ if(!data[k]) delete data[k]; });

  var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  var url = 'https://gregorionavarro.github.io/analisis-cliente-/iul.html?d=' + encoded;

  var firstName = nombre.split(' ')[0];
  var fecha = data.f || '';
  var msg = fecha
    ? 'Hola ' + firstName + ' 👋\n\nQuedamos confirmados para el *' + fecha + '*.\n\nTe comparto los beneficios exactos de tu póliza antes de nuestra reunión:\n\n🔗 ' + url + '\n\nRevísalo cuando puedas. ¡Nos vemos pronto!'
    : 'Hola ' + firstName + ' 👋\n\nTe comparto los beneficios exactos de tu póliza IUL:\n\n🔗 ' + url + '\n\nTómate unos minutos para revisarlo antes de nuestra conversación.';

  document.getElementById('result-url').textContent = url;
  document.getElementById('result-box').style.display = 'block';
  document.getElementById('wa-btn').href = 'https://wa.me/?text=' + encodeURIComponent(msg);
  document.getElementById('result-box').scrollIntoView({behavior:'smooth', block:'center'});
}

function copyLink(){
  var url = document.getElementById('result-url').textContent;
  try {
    if(navigator.clipboard && location.protocol === 'https:'){
      navigator.clipboard.writeText(url).then(showCopied);
    } else {
      var ta = document.createElement('textarea');
      ta.value = url; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      showCopied();
    }
  } catch(e){ prompt('Copia este link:', url); }
}
function showCopied(){
  var el = document.getElementById('copy-ok');
  el.style.display = 'block';
  setTimeout(function(){ el.style.display = 'none'; }, 3000);
}
</script>
</body>
</html>
